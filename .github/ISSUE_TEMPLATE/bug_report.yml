name: Bug report
description: Report a problem with Spiny
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report. Please search existing issues first.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am running the latest version I can reasonably test.
          required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Web
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / OS version
      placeholder: "e.g. Moto G Play, Android 11"
  - type: input
    id: version
    attributes:
      label: Spiny version / commit
      placeholder: "e.g. 1.0.0 or commit SHA"
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs (Metro or `adb logcat`) or attach screenshots.
      render: shell
