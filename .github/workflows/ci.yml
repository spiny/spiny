name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        # Non-blocking for now: the lint baseline still has pre-existing
        # findings. Remove continue-on-error once the baseline is clean.
        run: npm run lint
        continue-on-error: true
